spring.application.name=daily-ritual-scheduler-service
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/daily_ritual}
spring.datasource.username=${DB_USER:daily_ritual}
spring.datasource.password=${DB_PASSWORD:daily_ritual}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=scheduler
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.default-schema=scheduler
spring.liquibase.liquibase-schema=scheduler
auth.jwt.secret=${AUTH_JWT_SECRET:dev-jwt-secret-change-me-dev-jwt-secret}
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
app.aws.region=${APP_AWS_REGION:us-east-1}
app.aws.sqs-endpoint=${APP_AWS_SQS_ENDPOINT:http://localhost:4566}
app.sqs.reminder-queue-url=${APP_SQS_REMINDER_QUEUE_URL:http://localhost:4566/000000000000/reminder-due}
