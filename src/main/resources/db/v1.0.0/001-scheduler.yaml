databaseChangeLog:
  - changeSet:
      id: scheduler-001
      author: caiopinho
      changes:
        - createTable:
            tableName: tb_reminder_rules
            columns:
              - column: {name: co_seq_reminder_rule, type: BIGINT, autoIncrement: true, constraints: {primaryKey: true, nullable: false}}
              - column: {name: co_user, type: BIGINT, constraints: {nullable: false}}
              - column: {name: co_plan, type: BIGINT, constraints: {nullable: false}}
              - column: {name: no_title, type: varchar(255), constraints: {nullable: false}}
              - column: {name: nu_minutes_before, type: integer, constraints: {nullable: false}}
              - column: {name: dt_next_session_at, type: timestamp, constraints: {nullable: false}}
        - createTable:
            tableName: tb_reminder_jobs
            columns:
              - column: {name: co_seq_reminder_job, type: BIGINT, autoIncrement: true, constraints: {primaryKey: true, nullable: false}}
              - column: {name: co_reminder_rule, type: BIGINT, constraints: {nullable: false}}
              - column: {name: co_user, type: BIGINT, constraints: {nullable: false}}
              - column: {name: co_plan, type: BIGINT, constraints: {nullable: false}}
              - column: {name: no_title, type: varchar(255), constraints: {nullable: false}}
              - column: {name: dt_due_at, type: timestamp, constraints: {nullable: false}}
              - column: {name: st_emitted, type: boolean, constraints: {nullable: false}}
